<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Glitch Intro</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      overflow: hidden;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
    }

    .container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .glitch {
      color: white;
      font-size: 3rem;
      position: relative;
      opacity: 0;
      animation: fadeIn 3s ease forwards;
    }

    /* Fade in */
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* Glitch layers */
    .glitch::before,
    .glitch::after {
      content: "Can you hear me ?";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      overflow: hidden;
      color: white;
      background: black;
    }

    .glitch::before {
      left: 2px;
      text-shadow: -2px 0 red;
      animation: glitchTop 2s infinite linear alternate-reverse;
    }

    .glitch::after {
      left: -2px;
      text-shadow: -2px 0 blue;
      animation: glitchBottom 2s infinite linear alternate-reverse;
    }

    @keyframes glitchTop {
      0% { clip-path: inset(0 0 80% 0); }
      20% { clip-path: inset(0 0 60% 0); }
      40% { clip-path: inset(0 0 40% 0); }
      60% { clip-path: inset(0 0 20% 0); }
      80% { clip-path: inset(0 0 10% 0); }
      100% { clip-path: inset(0 0 80% 0); }
    }

    @keyframes glitchBottom {
      0% { clip-path: inset(80% 0 0 0); }
      20% { clip-path: inset(60% 0 0 0); }
      40% { clip-path: inset(40% 0 0 0); }
      60% { clip-path: inset(20% 0 0 0); }
      80% { clip-path: inset(10% 0 0 0); }
      100% { clip-path: inset(80% 0 0 0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="glitch">Can you hear me ?</div>
  </div>
</body>
</html>
