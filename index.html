<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Code Entry</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }

    /* Background video */
    #bgVideo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }

    input {
      padding: 10px;
      font-size: 16px;
      border: none;
      outline: none;
      width: 200px;
      text-align: center;
    }

    .shake {
      animation: shake 0.3s;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }

    .link {
      display: none;
      margin-top: 20px;
      text-align: center;
    }

    a {
      color: cyan;
      font-size: 18px;
    }
  </style>
</head>
<body>

<!-- 🔥 Put your video file here -->
<video id="bgVideo" autoplay muted loop>
  <source src="background.mp4" type="video/mp4">
</video>

<div class="container">
  <div id="box" class="box">
    <input id="codeInput" type="text" placeholder="Enter code" />
  </div>

  <div id="link" class="link">
    <p>Access granted:</p>
    <a href="https://www.youtube.com/watch?v=Fc1u-bggcfY" target="_blank">
      https://www.youtube.com/watch?v=Fc1u-bggcfY
    </a>
  </div>
</div>

<script>
  const input = document.getElementById('codeInput');
  const box = document.getElementById('box');
  const link = document.getElementById('link');

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      if (input.value === '12345') {
        box.style.display = 'none';
        link.style.display = 'block';
      } else {
        box.classList.add('shake');
        setTimeout(() => box.classList.remove('shake'), 300);
      }
    }
  });
</script>

</body>
</html>
